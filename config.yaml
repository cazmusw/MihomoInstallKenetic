rule-providers:
  amazon@domain: { <<: *domain, url: https://raw.githubusercontent.com/cazmusw/MihomoInstallKenetic/refs/heads/main/rulesets/amazon-domain.mrs }
  amazon@ipcidr: { <<: *ipcidr, url: https://raw.githubusercontent.com/cazmusw/MihomoInstallKenetic/refs/heads/main/rulesets/amazon-ipset.mrs }
  category-ai@domain: { <<: *domain, url: https://raw.githubusercontent.com/cazmusw/MihomoInstallKenetic/refs/heads/main/rulesets/ai-domain.mrs }
  cloudflare@domain: { <<: *domain, url: https://raw.githubusercontent.com/cazmusw/MihomoInstallKenetic/refs/heads/main/rulesets/cloudflare-domain.mrs }
  cloudflare@ipcidr: { <<: *ipcidr, url: https://raw.githubusercontent.com/cazmusw/MihomoInstallKenetic/refs/heads/main/rulesets/cloudflare-ipset.mrs }
  discord@ipcidr: { <<: *ipcidr, url: https://raw.githubusercontent.com/cazmusw/MihomoInstallKenetic/refs/heads/main/rulesets/discord-voice-ip-history.mrs }
  discord@classical: { <<: *classical, url: https://raw.githubusercontent.com/cazmusw/MihomoInstallKenetic/refs/heads/main/rules/discord.list }
  google@domain: { <<: *domain, url: https://raw.githubusercontent.com/cazmusw/MihomoInstallKenetic/refs/heads/main/rulesets/google-domain.mrs }
  github@domain: { <<: *domain, url: https://raw.githubusercontent.com/cazmusw/MihomoInstallKenetic/refs/heads/main/rulesets/github-domain.mrs }
  meta@domain: { <<: *domain, url: https://raw.githubusercontent.com/cazmusw/MihomoInstallKenetic/refs/heads/main/rulesets/facebook-domain.mrs }
  meta@ipcidr: { <<: *ipcidr, url: https://raw.githubusercontent.com/cazmusw/MihomoInstallKenetic/refs/heads/main/rulesets/facebook-ipset.mrs }
  reddit@domain: { <<: *domain, url: https://raw.githubusercontent.com/cazmusw/MihomoInstallKenetic/refs/heads/main/rulesets/reddit-domain.mrs }
  spotify@domain: { <<: *domain, url: https://raw.githubusercontent.com/cazmusw/MihomoInstallKenetic/refs/heads/main/rulesets/spotify-domain.mrs }
  steam@domain: { <<: *domain, url: https://raw.githubusercontent.com/cazmusw/MihomoInstallKenetic/refs/heads/main/rulesets/steam-domain.mrs }
  telegram@domain: { <<: *domain, url: https://raw.githubusercontent.com/cazmusw/MihomoInstallKenetic/refs/heads/main/rulesets/telegram-domain.mrs }
  telegram@ipcidr: { <<: *ipcidr, url: https://raw.githubusercontent.com/cazmusw/MihomoInstallKenetic/refs/heads/main/rulesets/telegram-ipset.mrs }
  twitch@domain: { <<: *domain, url: https://raw.githubusercontent.com/cazmusw/MihomoInstallKenetic/refs/heads/main/rulesets/twitch-domain.mrs }
  twitter@domain: { <<: *domain, url: https://raw.githubusercontent.com/cazmusw/MihomoInstallKenetic/refs/heads/main/rulesets/twitter-domain.mrs }
  youtube@domain: { <<: *domain, url: https://raw.githubusercontent.com/cazmusw/MihomoInstallKenetic/refs/heads/main/rulesets/youtube-domain.mrs }
  adlist@domain: { <<: *domain, url: https://github.com/cazmusw/ad-filter/releases/latest/download/adlist.mrs }
  hetzner@domain: { <<: *domain, url: https://raw.githubusercontent.com/cazmusw/MihomoInstallKenetic/refs/heads/main/rulesets/hetzner-domain.mrs }
  minecraft@classical: { <<: *classical, url: https://raw.githubusercontent.com/cazmusw/MihomoInstallKenetic/refs/heads/main/rules/minecraft.list }

rules:
  - RULE-SET,adlist@domain,Блокировка рекламы

  - AND,((DST-PORT,443),(NETWORK,UDP)),QUIC
  
  - RULE-SET,discord@ipcidr,DiscordVoice,no-resolve
  - RULE-SET,discord@classical,Discord
  

  - OR,((DOMAIN-SUFFIX,gql.twitch.tv),(DOMAIN-SUFFIX,usher.ttvnw.net)),Twitch 
  - OR,((GEOIP,HETZNER),(RULE-SET,hetzner@domain)),Hetzner

  - RULE-SET,category-ai@domain,AI
  - RULE-SET,steam@domain,Steam
  - RULE-SET,spotify@domain,Spotify
  - RULE-SET,reddit@domain,Reddit
  - RULE-SET,youtube@domain,YouTube
  - RULE-SET,twitch@domain,Twitch
  - RULE-SET,twitter@domain,Twitter
  - RULE-SET,minecraft@classical,MineCraft


  - OR,((RULE-SET,meta@domain),(RULE-SET,meta@ipcidr,no-resolve)),Meta
  - OR,((RULE-SET,telegram@domain),(RULE-SET,telegram@ipcidr,no-resolve)),Telegram
  - OR,((RULE-SET,cloudflare@domain),(RULE-SET,cloudflare@ipcidr)),Cloudflare
  - OR,((RULE-SET,amazon@domain),(RULE-SET,amazon@ipcidr)),Amazon
  - RULE-SET,google@domain,Google
  - RULE-SET,github@domain,GitHub

  - GEOSITE,jetbrains,JetBrains
  - GEOSITE,tiktok,TikTok
  - GEOSITE,mozilla,Mozilla
  - GEOSITE,microsoft,Microsoft
  - GEOSITE,instagram,Instagram

  - MATCH,DIRECT